      {
        "Id": "API definition",
        "Type": "Compiled:String?",
        "ValueUsage": "DesignTime",
        "Value": "openapi: 3.0.3\r\ninfo:\r\n  title: BffAuthentication\r\n  version: 1.0.0\r\n  description: |\r\n    Backend-for-Frontend (BFF) authentication API for credentials-based login\r\n    without SSO, OIDC, or an external identity provider.\r\n\r\n    Session state is conveyed exclusively via an HttpOnly, Secure,\r\n    SameSite=Strict cookie set by the backend on successful login. Protected\r\n    endpoints (/v1/auth/logout, /v1/auth/userinfo) require this cookie.\r\n\r\n    The frontend SPA and the BFF must share an eTLD+1 (e.g. app.example.com +\r\n    bff.example.com, or both on localhost) so SameSite=Strict cookies are\r\n    delivered on cross-origin same-site requests.\r\n\r\nservers:\r\n  - url: http://localhost:10010\r\n    description: Local development server (HTTPS)\r\n\r\npaths:\r\n  /v1/auth/login:\r\n    post:\r\n      operationId: AuthLogin\r\n      summary: Authenticate with username and password\r\n      description: |\r\n        Validates submitted credentials and, on success, sets an HttpOnly,\r\n        Secure, SameSite=Strict session cookie. Returns 200 with a\r\n        confirmation message. The frontend decides where to navigate next.\r\n\r\n        On failure, returns 401 with a deliberately generic message that\r\n        does not reveal which field was incorrect.\r\n      tags: [Authentication]\r\n      security: []\r\n      requestBody:\r\n        required: true\r\n        content:\r\n          application/json:\r\n            schema:\r\n              $ref: \"#/components/schemas/LoginRequest\"\r\n            example:\r\n              Username: demo@test.com\r\n              Password: changeme\r\n      responses:\r\n        \"200\":\r\n          description: OK (200)\r\n          headers:\r\n            Set-Cookie:\r\n              description: \"Session cookie. Attributes: HttpOnly; Secure; SameSite=Strict; Path=/.\"\r\n              schema:\r\n                type: string\r\n                example: \"session=<opaque-token>; Path=/; HttpOnly; Secure; SameSite=Strict\"\r\n          content:\r\n            application/json:\r\n              schema:\r\n                $ref: \"#/components/schemas/DefaultResponse\"\r\n              example:\r\n                Messages:\r\n                  - Login successful\r\n        \"400\":\r\n          description: Invalid request body (missing or malformed fields).\r\n          content:\r\n            application/json:\r\n              schema:\r\n                $ref: \"#/components/schemas/ErrorResponse\"\r\n              example:\r\n                Error: INVALID_REQUEST\r\n                Message: Username and password are required.\r\n        \"401\":\r\n          description: Unauthorized (401)\r\n        \"500\":\r\n          description: Internal Server Error (500)\r\n          content:\r\n            application/json:\r\n              schema:\r\n                $ref: \"#/components/schemas/DefaultResponse\"\r\n\r\n  /v1/auth/logout:\r\n    post:\r\n      operationId: AuthLogout\r\n      summary: Sign out and invalidate the session cookie\r\n      description: |\r\n        Invalidates the server-side session and instructs the browser to\r\n        clear the session cookie via Set-Cookie with Max-Age=0. The frontend\r\n        must wait for this response before navigating away.\r\n      tags: [Authentication]\r\n      security:\r\n        - SessionCookie: []\r\n      responses:\r\n        \"200\":\r\n          description: OK (200)\r\n          headers:\r\n            Set-Cookie:\r\n              description: Cookie-clearing directive (same name, Max-Age=0).\r\n              schema:\r\n                type: string\r\n                example: \"session=; Path=/; HttpOnly; Secure; SameSite=Strict; Max-Age=0\"\r\n          content:\r\n            application/json:\r\n              schema:\r\n                $ref: \"#/components/schemas/DefaultResponse\"\r\n              example:\r\n                Messages:\r\n                  - Logout successful\r\n        \"401\":\r\n          description: Unauthorized (401)\r\n        \"500\":\r\n          description: Internal Server Error (500)\r\n          content:\r\n            application/json:\r\n              schema:\r\n                $ref: \"#/components/schemas/DefaultResponse\"\r\n\r\n  /v1/auth/userinfo:\r\n    get:\r\n      operationId: AuthUserInfoGet\r\n      summary: Retrieve the authenticated user's information\r\n      description: |\r\n        Returns the authenticated user's profile. Used by the frontend to\r\n        render the welcome message on the confirmation page and to verify\r\n        session validity on page load.\r\n      tags: [Authentication]\r\n      security:\r\n        - SessionCookie: []\r\n      responses:\r\n        \"200\":\r\n          description: OK (200)\r\n          content:\r\n            application/json:\r\n              schema:\r\n                $ref: \"#/components/schemas/UserInfoRead\"\r\n              example:\r\n                Username: demo\r\n        \"401\":\r\n          description: Unauthorized (401)\r\n        \"500\":\r\n          description: Internal Server Error (500)\r\n          content:\r\n            application/json:\r\n              schema:\r\n                $ref: \"#/components/schemas/DefaultResponse\"\r\n\r\n  /v1/health:\r\n    get:\r\n      operationId: HealthGet\r\n      summary: Health probe\r\n      description: Returns 200 unconditionally if the BFF is reachable. No session required.\r\n      tags: [Health]\r\n      security: []\r\n      responses:\r\n        \"200\":\r\n          description: OK (200)\r\n        \"500\":\r\n          description: Internal Server Error (500)\r\n          content:\r\n            application/json:\r\n              schema:\r\n                $ref: \"#/components/schemas/DefaultResponse\"\r\n\r\ncomponents:\r\n  securitySchemes:\r\n    SessionCookie:\r\n      type: apiKey\r\n      in: cookie\r\n      name: session\r\n      description: |\r\n        HttpOnly, Secure, SameSite=Strict session cookie set by POST\r\n        /v1/auth/login. Browser attaches it automatically on same-site requests.\r\n        Required by /v1/auth/logout and /v1/auth/userinfo.\r\n\r\n  schemas:\r\n    LoginRequest:\r\n      type: object\r\n      description: Credentials submitted to POST /v1/auth/login.\r\n      properties:\r\n        Username:\r\n          type: string\r\n          description: Account username.\r\n          example: demo\r\n        Password:\r\n          type: string\r\n          description: Plaintext password sent over HTTPS; compared server-side against a bcrypt hash.\r\n          example: changeme\r\n\r\n    UserInfoRead:\r\n      type: object\r\n      properties:\r\n        Id:\r\n          type: integer\r\n          example: '1'\r\n        Email:\r\n          type: string\r\n          example: 'Test@gmail.com'\r\n        FirstName:\r\n          type: string\r\n          example: 'John'\r\n        LastName:\r\n          type: string\r\n          example: 'Doe'\r\n        RolesString:\r\n          type: string\r\n          example: 'Viewer'\r\n        Roles:\r\n          type: array\r\n          items:\r\n            $ref: '#/components/schemas/RoleRead'\r\n        Pages:\r\n          type: array\r\n          items:\r\n            $ref: '#/components/schemas/PageRead'\r\n        LastChangedUser:\r\n          type: string\r\n          example: 'Sarah'\r\n        LastChangedDate:\r\n          type: string\r\n          example: '2025-04-30 15:00:00'\r\n\r\n    RoleRead:\r\n      type: object\r\n      properties:\r\n        Id:\r\n          type: integer\r\n          example: '1'\r\n        Name:\r\n          type: string\r\n          example: 'Viewer'\r\n        Pages:\r\n          type: array\r\n          items:\r\n            $ref: '#/components/schemas/PageRead'\r\n        LastChangedUser:\r\n          type: string\r\n          example: 'John Doe'\r\n        LastChangedDate:\r\n          type: string\r\n          example: '2025-04-30 15:00:00'\r\n\r\n    PageRead:\r\n      type: object\r\n      properties:\r\n        Id:\r\n          type: integer\r\n          example: '1'\r\n        Name:\r\n          type: string\r\n          example: 'Dashboard'\r\n        Route:\r\n          type: string\r\n          example: '/dashboard'\r\n\r\n    DefaultResponse:\r\n      type: object\r\n      description: Standard response for POST endpoints and 500 errors across all endpoints.\r\n      properties:\r\n        Id:\r\n          type: integer\r\n        MessageType:\r\n          type: string\r\n        Messages:\r\n          type: array\r\n          items:\r\n            type: string\r\n\r\n    ErrorResponse:\r\n      type: object\r\n      description: |\r\n        Error response for invalid requests (400). Error is a machine-readable\r\n        code; Message is a human-readable description.\r\n      properties:\r\n        Error:\r\n          type: string\r\n          description: |\r\n            Machine-readable error code. Known values:\r\n            - INVALID_REQUEST — POST /v1/auth/login, malformed body (400)\r\n          example: INVALID_REQUEST\r\n        Message:\r\n          type: string\r\n          example: Username and password are required."
      },
